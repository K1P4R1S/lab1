<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 3: Оплата картой</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <div class="payment-container">
        <div class="payment-header">
            <h2>💳 Оплата картой</h2>
            <span>Безопасная оплата</span>
        </div>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="card-number">Номер карты</label>
                <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" pattern="\d{16}" required>
            </div>

            <div class="form-group">
                <label for="card-holder">Имя владельца</label>
                <input type="text" id="card-holder" placeholder="IVAN IVANOV" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="expiry">Срок действия</label>
                    <input type="text" id="expiry" placeholder="MM / YY" maxlength="5" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV / CVN</label>
                    <input type="password" id="cvv" placeholder="•••" maxlength="3" required>
                </div>
            </div>

            <button type="submit" class="btn-pay">Оплатить</button>

            <div class="secure-note">Данные защищены SSL шифрованием</div>
        </form>
    </div>

</body>
</html>
