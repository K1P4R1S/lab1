<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardGame</title>
    <style>
        .A{
            font-family:sans-serif;
            background-color: #f0f0f0;
            padding: 4px 8px 4px 8px;
            font-size: 32px;
        }
        .B{
            font-family:sans-serif;
            background-color: #f0f0f0;
            color: red;
            padding: 4px 8px 4px 8px;
            font-size: 32px;
        }
    </style>
</head>
<body>
    <p>Player 1:</p>
    <span class="A">2♣</span>
    <span class="B">9♥</span>
    <span class="B">6♥</span>
    <span class="B">A♦</span>
    <span class="A">Q♠</span>
    <span class="A">J♣</span>
    <p>Player 2:</p>
    <span class="B">3♥</span>
    <span class="A">A♣</span>
    <span class="A">10♣</span>
    <span class="B">K♦</span>
    <span class="A">8♠</span>
    <span class="B">3♥</span>
</body>
</html>
