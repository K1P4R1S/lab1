<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-do-list</title>
</head>

<body>
    <div class="outer-wrapper">
        <h1>My To Do List</h1>
        <ul class="todo-list">
            <li>
                <input type="checkbox" id="task1">
                <label for="task1">
                    <span class="checkbox-icon"></span>
                    <span class="text">Hit the gym</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task2" checked> <label for="task2">
                    <span class="checkbox-icon"></span>
                    <span class="text">Pay bills</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task3">
                <label for="task3">
                    <span class="checkbox-icon"></span>
                    <span class="text">Meet John</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task4">
                <label for="task4">
                    <span class="checkbox-icon"></span>
                    <span class="text">Buy eggs</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task5" checked>
                <label for="task5">
                    <span class="checkbox-icon"></span>
                    <span class="text">Read a book</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task6">
                <label for="task6">
                    <span class="checkbox-icon"></span>
                    <span class="text">Organize office</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task7">
                <label for="task7">
                    <span class="checkbox-icon"></span>
                    <span class="text">Eat dinner</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task8">
                <label for="task8">
                    <span class="checkbox-icon"></span>
                    <span class="text">Buy apples</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task9">
                <label for="task9">
                    <span class="checkbox-icon"></span>
                    <span class="text">Meet George</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task10">
                <label for="task10">
                    <span class="checkbox-icon"></span>
                    <span class="text">Feed the cat</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task11" checked>
                <label for="task11">
                    <span class="checkbox-icon"></span>
                    <span class="text">Write a letter</span>
                    <span class="close">×</span>
                </label>
            </li>
            <li>
                <input type="checkbox" id="task12">
                <label for="task12">
                    <span class="checkbox-icon"></span>
                    <span class="text">Run 1 km</span>
                    <span class="close">×</span>
                </label>
            </li>
        </ul>
    </div>
</body>

</html>
