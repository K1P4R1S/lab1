<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <title>Задание №1 — Загрузка видео</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="loader">

        <img class="loader_image" src="img/1.jpg" alt="Превью видео">

        <div class="loader_info">
            <h2 class="loader_title">НАЗВАНИЕ ВИДЕО</h2>
            <p class="loader_author">Канал: НАЗВАНИЕ КАНАЛА</p>
            <p class="loader_progress">Загружено: 32% · 0.58 ГБ из 1.8 ГБ</p>
            <p class="loader_progress">Осталось: 0:45</p>
            <div class="loader_bar">
                <div class="loader_bar-fill"></div>
            </div>
        </div>

        <button class="loader_button">Отменить</button>

    </div>

</body>

</html>
